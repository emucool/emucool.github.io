<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EmuCool</title>
    <meta name="description" content="EmuCool — coming soon." />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0c0d10;
        --fg: #e8eaef;
        --muted: #9aa3b2;
        --accent: #6ee7b7;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7f9;
          --fg: #12141a;
          --muted: #5c6575;
          --accent: #0d9488;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(
            1200px 600px at 50% -20%,
            color-mix(in oklab, var(--accent) 18%, transparent),
            transparent 60%
          ),
          var(--bg);
        color: var(--fg);
        line-height: 1.6;
        padding: 2rem 1.25rem;
      }
      main {
        width: min(40rem, 100%);
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2rem, 5vw, 2.75rem);
        letter-spacing: -0.02em;
        font-weight: 700;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        border: 1px solid color-mix(in oklab, var(--fg) 14%, transparent);
        background: color-mix(in oklab, var(--fg) 4%, transparent);
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 1.25rem;
      }
      .dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 35%, transparent);
      }
      footer {
        margin-top: 2rem;
        font-size: 0.85rem;
        color: color-mix(in oklab, var(--muted) 85%, transparent);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge" aria-hidden="true"><span class="dot"></span> GitHub Pages</div>
      <h1>EmuCool</h1>
      <p>This site is live. Replace this page with your project when you are ready.</p>
      <footer>emucool.github.io</footer>
    </main>
  </body>
</html>
